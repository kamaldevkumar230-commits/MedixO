<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<title>MedixO | Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<style>

/* Background */

body{
height:100vh;
background:linear-gradient(135deg,#e3f2fd,#bbdefb);
display:flex;
flex-direction:column;
font-family: 'Segoe UI', sans-serif;
}

/* Navbar */

.navbar{
padding:12px 0;
}

/* Login Wrapper */

.login-wrapper{
flex:1;
display:flex;
align-items:center;
justify-content:center;
}

/* Login Card */

/* Login Card */

.login-card{
width:380px;
padding:35px;
border-radius:15px;
background:rgba(255,255,255,0.9);
backdrop-filter:blur(15px);
box-shadow:0 10px 30px rgba(0,0,0,0.2);
color:#1f2d3d;   /* text dark */
}

/* Input */

.form-control{
border-radius:8px;
padding-left:40px;
color:#212529;
}

/* Icon inside input */

.input-icon{
position:relative;
}

.input-icon i{
position:absolute;
top:11px;
left:12px;
color:#6c757d;
}

/* Button */

.login-btn{
border-radius:25px;
font-weight:600;
padding:10px;
background:#0d6efd;
color:white;
border:none;
}

/* Error */

.error-msg{
font-size:14px;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">

<div class="container">

<a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="#">

<img src="https://cdn-icons-png.flaticon.com/512/2966/2966327.png"
width="36">

MedixO

</a>

<div class="d-flex gap-3">

<a href="/" class="text-white text-decoration-none">Home</a>

<a href="doctors" class="text-white text-decoration-none">Doctors</a>

<a href="register" class="text-white text-decoration-none">Register</a>

</div>

</div>

</nav>


<!-- LOGIN SECTION -->

<div class="login-wrapper">

<div class="login-card">

<h3 class="text-center mb-4">
<i class="fa fa-hospital"></i>
Hospital Login
</h3>

<form th:action="@{/doLogin}" method="post">

<!-- Email -->

<div class="mb-3 input-icon">

<i class="fa fa-envelope"></i>

<input type="email"
name="email"
class="form-control"
placeholder="Enter Email"
required>

</div>

<!-- Password -->

<div class="mb-3 input-icon">

<i class="fa fa-lock"></i>

<input type="password"
name="password"
class="form-control"
placeholder="Enter Password"
required>

</div>

<!-- Login Button -->

<button class="btn btn-light w-100 login-btn">

Login

</button>

</form>

<p class="text-warning text-center mt-3 error-msg"
th:text="${error}"></p>

<hr>

<p class="text-center">

Don't have account?

<a href="/register" class="fw-bold">

Register

</a>

</p>

</div>

</div>

</body>

</html>
