<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Select Doctor</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>Select Doctor</h2>

<div class="row">

<div class="col-md-4 mb-3" th:each="d : ${doctors}">

<div class="card shadow">

<div class="card-body">

<h5 th:text="${d.firstName} + ' ' + ${d.lastName}"></h5>

<p th:text="${d.specialization}"></p>

<a th:href="@{/book/{id}(id=${d.id})}" class="btn btn-primary">
Book Appointment
</a>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
