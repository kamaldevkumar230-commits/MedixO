<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<title>MedixO | Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<style>

/* Background */

body{
height:100vh;
background:linear-gradient(135deg,#e3f2fd,#bbdefb);
display:flex;
flex-direction:column;
font-family:'Segoe UI',sans-serif;
}

/* Navbar */

.navbar{
padding:12px 0;
}

/* Wrapper */

.register-wrapper{
flex:1;
display:flex;
align-items:center;
justify-content:center;
}

/* Card */

.register-card{
width:420px;
padding:35px;
border-radius:15px;
background:rgba(255,255,255,0.9);
backdrop-filter:blur(10px);
box-shadow:0 10px 30px rgba(0,0,0,0.15);
color:#1f2d3d;
}

/* Input */

.form-control{
border-radius:8px;
padding-left:40px;
}

/* Icon */

.input-icon{
position:relative;
}

.input-icon i{
position:absolute;
top:11px;
left:12px;
color:#6c757d;
}

/* Button */

.register-btn{
border-radius:25px;
font-weight:600;
padding:10px;
}

/* Title */

.card-title{
font-weight:600;
}

</style>

</head>

<body>


<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">

<div class="container">

<a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="/">

<img src="https://cdn-icons-png.flaticon.com/512/2966/2966327.png"
width="36">

MedixO

</a>

<div class="d-flex gap-3">

	<a href="/" class="btn btn-outline-light btn-sm">
	<i class="fa fa-home"></i> Home
	</a>

<button onclick="history.back()" 
        class="btn btn-outline-light btn-sm">
        <i class="fa fa-arrow-left"></i> Back
</button>


<a href="/login" class="btn btn-outline-light btn-sm">
<i class="fa fa-sign-in"></i> Login
</a>

</div>

</div>

</nav>



<!-- REGISTER -->

<div class="register-wrapper">

<div class="register-card">

<h3 class="text-center card-title mb-4">

<i class="fa fa-user-plus"></i>

User Registration

</h3>

<form th:action="@{/saveUser}" th:object="${user}" method="post">

<!-- Name -->

<div class="mb-3 input-icon">

<i class="fa fa-user"></i>

<input type="text"
th:field="*{name}"
class="form-control"
placeholder="Enter Full Name"
required>

</div>

<!-- Email -->

<div class="mb-3 input-icon">

<i class="fa fa-envelope"></i>

<input type="email"
th:field="*{email}"
class="form-control"
placeholder="Enter Email"
required>

</div>

<!-- Password -->

<div class="mb-3 input-icon">

<i class="fa fa-lock"></i>

<input type="password"
th:field="*{password}"
class="form-control"
placeholder="Enter Password"
required>

</div>

<!-- Role -->

<div class="mb-3">

<select th:field="*{role}" class="form-control">

<option value="">Select Role</option>



<option value="DOCTOR">Doctor</option>

<option value="PATIENT">Patient</option>

</select>

</div>

<button class="btn btn-primary w-100 register-btn">

Register

</button>

</form>


<hr>

<p class="text-center">

Already have account?

<a href="/login" class="fw-bold">

Login

</a>

</p>

</div>

</div>

</body>

</html>
