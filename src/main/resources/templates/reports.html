<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<meta charset="UTF-8">
<title>Medical Reports | Medixo</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<style>

body{
background:#f4f6fb;
font-family:Segoe UI;
}

.card{
border:none;
border-radius:10px;
box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

.table thead{
background:#0d6efd;
color:white;
}

.table tbody tr:hover{
background:#f1f5ff;
}

</style>

</head>

<body>

<div class="container mt-4">

<h3 class="mb-4">
<i class="fa fa-file-medical text-primary"></i>
Medical Reports
</h3>

<div class="card">

<div class="card-body">

<table class="table table-hover">

<thead>

<tr>

<th>Patient Name</th>
<th>Doctor</th>
<th>Date</th>
<th>Action</th>

</tr>

</thead>

<tbody>

<tr th:each="report : ${reports}">

<td th:text="${report.patientName}"></td>

<td th:text="${report.doctorName}"></td>

<td th:text="${report.date}"></td>

<td>

<a th:href="@{/report/download/{id}(id=${report.id})}"
class="btn btn-danger btn-sm">

<i class="fa fa-file-pdf"></i>
PDF

</a>

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

</body>
</html>
