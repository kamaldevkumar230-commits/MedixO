<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Doctor Approval Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #eef2f7, #f8fafc);
            padding: 30px;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #2c3e50;
        }

        .container {
            width: 90%;
            margin: auto;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #4f46e5;
            color: white;
            padding: 14px;
        }

        td {
            padding: 14px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f9fafb;
        }

        .badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        .pending {
            background: #fff4e5;
            color: #ff9800;
        }

        .approved {
            background: #e6f7ee;
            color: #28a745;
        }

        .btn {
            padding: 6px 14px;
            border-radius: 6px;
            text-decoration: none;
            color: white;
            font-size: 13px;
        }

        .approve-btn {
            background: #28a745;
        }

        .approve-btn:hover {
            background: #218838;
        }
    </style>
</head>

<body>

<h2>Doctor Approval Dashboard</h2>

<div class="container">

<table>
    <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Status</th>
        <th>Action</th>
    </tr>

    <tr th:each="doc : ${doctors}">
        <td th:text="${doc.name}"></td>
        <td th:text="${doc.email}"></td>

        <!-- ✅ STATUS -->
        <td>
            <!-- Approved -->
            <span th:if="${doc.isApproved == 1}" class="badge approved">
                Approved
            </span>

            <!-- Pending (default) -->
            <span th:if="${doc.isApproved != 1}" class="badge pending">
                Pending
            </span>
        </td>

        <!-- ✅ ACTION -->
        <td>
            <!-- Show button if NOT approved -->
			<a th:if="${!doc.approved}"
			   th:href="@{'/admin/approve/' + ${doc.id}}"
			   class="btn approve-btn">
			   Approve
			</a>

            <!-- Show text if approved -->
            <span th:if="${doc.isApproved == 1}" style="color:green;font-weight:bold;">
                ✔ Approved
            </span>
        </td>
    </tr>

</table>

</div>

</body>
</html>
