<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Doctor Approval Dashboard</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- ✅ Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- ✅ Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #eef2f7, #f8fafc);
        }

        h2 {
            text-align: center;
            margin: 25px 0;
            color: #2c3e50;
        }

        /* ✅ container rename karo */
        .custom-container {
            width: 90%;
            margin: auto;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #4f46e5;
            color: white;
            padding: 14px;
        }

        td {
            padding: 14px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f9fafb;
        }

        .badge-custom {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        .pending {
            background: #fff4e5;
            color: #ff9800;
        }

        .approved {
            background: #e6f7ee;
            color: #28a745;
        }

        .approve-btn {
            background: #28a745;
            color: white;
            padding: 6px 14px;
            border-radius: 6px;
            text-decoration: none;
        }

        .approve-btn:hover {
            background: #218838;
        }
    </style>
</head>

<body>

<!-- ✅ NAVBAR (Bootstrap works properly now) -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">

        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="#">
            <img src="https://cdn-icons-png.flaticon.com/512/2966/2966327.png" width="36">
            MedixO
        </a>

        <div class="d-flex gap-3 align-items-center">
            <a href="/" class="text-white text-decoration-none">Home</a>
            <a href="doctors" class="text-white text-decoration-none">Doctors</a>

            <button onclick="history.back()" class="btn btn-outline-light btn-sm">
                <i class="fa fa-arrow-left"></i> Back
            </button>
        </div>

    </div>
</nav>

<h2>Doctor Approval Dashboard</h2>

<div class="custom-container">

<table>
    <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Status</th>
        <th>Action</th>
    </tr>

    <tr th:each="doc : ${doctors}">
        <td th:text="${doc.name}"></td>
        <td th:text="${doc.email}"></td>

        <td>
            <span th:if="${doc.isApproved == 1}" class="badge-custom approved">
                Approved
            </span>

            <span th:if="${doc.isApproved != 1}" class="badge-custom pending">
                Pending
            </span>
        </td>

        <td>
            <a th:if="${doc.isApproved != 1}"
               th:href="@{'/admin/approve/' + ${doc.id}}"
               class="approve-btn">
               Approve
            </a>

            <span th:if="${doc.isApproved == 1}" style="color:green;font-weight:bold;">
                ✔ Approved
            </span>
        </td>
    </tr>

</table>

</div>

</body>
</html>
