<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<title>Create Medical Report | MedixO</title>

<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<style>

body{
background:#f4f7fc;
font-family:'Segoe UI',sans-serif;
}

.navbar{
background:#0d6efd;
}


.navbar{
padding:12px 0;
}
.navbar-brand{
color:white;
font-weight:bold;
}

.card{
border:none;
border-radius:12px;
}

.section-title{
font-weight:600;
margin-bottom:10px;
color:#0d6efd;
}

</style>






</head>

<body>

<!-- NAVBAR -->

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">

<div class="container">

<a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="#">

<img src="https://cdn-icons-png.flaticon.com/512/2966/2966327.png"
width="36">

MedixO

</a>

<div class="d-flex gap-3">

<a href="/" class="text-white text-decoration-none">Home</a>

<a href="doctors" class="text-white text-decoration-none">Doctors</a>

<a href="register" class="text-white text-decoration-none">Register</a>

</div>

</div>

</nav>




<div class="container mt-4">

<div class="card shadow">

<div class="card-body">

<h4 class="mb-4">

<i class="fa fa-file-medical"></i>
Create Medical Report

</h4>


<form th:action="@{/saveReport}" method="post">


<input type="hidden" th:value="${report.appointmentId}" name="appointmentId">


<!-- Patient Info -->

<div class="row mb-3">

<div class="col-md-6">

<label class="section-title">Patient Name</label>

<input type="text" class="form-control"
name="patientName"
th:value="${report.patientName}"
readonly>

</div>

<div class="col-md-6">

<label class="section-title">Doctor Name</label>

<input type="text"
class="form-control"
name="doctorName"
th:value="${report.doctorName}"
readonly>

</div>

</div>


<!-- Diagnosis -->

<div class="mb-4">

<label class="section-title">Diagnosis</label>

<input type="text"
class="form-control"
name="disease"
placeholder="Enter patient diagnosis">

</div>


<!-- Medicines -->

<label class="section-title">Prescription</label>

<div id="medicineContainer">

<div class="row medicine-row">

<div class="col-md-4">

<select class="form-control medicine-select"
name="medicine[]"
style="width:100%"></select>

</div>

<div class="col-md-3">

<select class="form-control" name="dosage[]">

<option>Select Dosage</option>
<option>Once Daily</option>
<option>Twice Daily</option>
<option>Three Times Daily</option>
<option>Morning & Night</option>
<option>Before Meal</option>
<option>After Meal</option>

</select>

</div>

<div class="col-md-3">

<select class="form-control" name="duration[]">

<option>Select Duration</option>
<option>3 Days</option>
<option>5 Days</option>
<option>7 Days</option>
<option>10 Days</option>
<option>14 Days</option>
<option>1 Month</option>

</select>

</div>

<div class="col-md-2">

<button type="button" class="btn btn-danger removeMedicine">

<i class="fa fa-trash"></i>

</button>

</div>

</div>

</div>


<button type="button" class="btn btn-primary mb-4" id="addMedicine">

<i class="fa fa-plus"></i> Add Medicine

</button>


<!-- Notes -->

<div class="mb-3">

<label class="section-title">Doctor Advice</label>

<textarea class="form-control"
name="notes"
rows="4"
placeholder="Doctor advice for patient"></textarea>

</div>


<button class="btn btn-success">

<i class="fa fa-save"></i>
Save Medical Report

</button>

</form>

</div>

</div>

</div>


<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<script>

function initSelect2(element){

$(element).select2({

placeholder:"Search medicine",

minimumInputLength:2,

ajax:{
url:"/api/search-medicine",
dataType:"json",
delay:250,
data:function(params){
return {keyword:params.term};
},
processResults:function(data){
return {results:data};
}
}

});

}

$(document).ready(function(){

initSelect2($('.medicine-select'));


$("#addMedicine").click(function(){

let row = $('.medicine-row:first').clone();

row.find("select").val("");

$("#medicineContainer").append(row);

initSelect2(row.find(".medicine-select"));

});


$(document).on("click",".removeMedicine",function(){

if($('.medicine-row').length>1){
$(this).closest(".medicine-row").remove();
}

});

});

</script>

</body>
</html>
