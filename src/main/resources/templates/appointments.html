<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Appointments | Medixo HMS</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>Appointment Management</h2>

<form th:action="@{/appointments/save}" th:object="${appointment}" method="post">

<input type="text" th:field="*{patientName}" placeholder="Patient Name" class="form-control mb-2">

<input type="text" th:field="*{patientPhone}" placeholder="Phone" class="form-control mb-2">

<input type="text" th:field="*{doctorName}" placeholder="Doctor Name" class="form-control mb-2">

<input type="datetime-local" th:field="*{appointmentTime}" class="form-control mb-2">

<button class="btn btn-primary">Book Appointment</button>

</form>

<hr>

<table class="table">

<thead>

<tr>
<th>ID</th>
<th>Patient</th>
<th>Doctor</th>
<th>Time</th>
<th>Action</th>
</tr>

</thead>

<tbody>

<tr th:each="a : ${appointments}">

<td th:text="${a.id}"></td>

<td th:text="${a.patientName}"></td>

<td th:text="${a.doctorName}"></td>

<td th:text="${a.appointmentTime}"></td>

<td>

<a th:href="@{/appointments/delete/{id}(id=${a.id})}" class="btn btn-danger btn-sm">
Delete
</a>

</td>

</tr>

</tbody>

</table>

</div>

</body>

</html>
