<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<title>Appointments | MedixO</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<style>

body{
background:#f4f7fc;
font-family:'Segoe UI',sans-serif;
}

/* Navbar */

.navbar{
background:#0d6efd;
}

.navbar-brand{
font-weight:bold;
color:white;
}

.navbar a{
color:white;
}

/* Page header */

.page-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

/* Card */

.card{
border:none;
border-radius:12px;
}

/* Table */

.table thead{
background:#343a40;
color:white;
}

/* Status badge */

.badge{
padding:7px 12px;
font-size:13px;
border-radius:20px;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">

<div class="container">

<a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="#">

<img src="https://cdn-icons-png.flaticon.com/512/2966/2966327.png"
width="36">

MedixO

</a>

<div class="d-flex gap-3">

<a href="/" class="text-white text-decoration-none">Home</a>

<a href="doctors" class="text-white text-decoration-none">Doctors</a>

<a href="register" class="text-white text-decoration-none">Register</a>

</div>

</div>

</nav>



<div class="container mt-4">

<div class="page-header">

<h3>

<i class="fa fa-calendar-check"></i>
Appointment List

</h3>

<input type="text" class="form-control w-25"
placeholder="Search Appointment...">

</div>


<div class="card shadow">

<div class="card-body">

<table class="table table-hover align-middle">

<thead>

<tr>

<th>ID</th>
<th>Patient</th>
<th>Doctor</th>
<th>Date</th>
<th>Time</th>
<th>Problem</th>
<th>Status</th>
<th>Action</th>
<th>Report</th>

</tr>

</thead>

<tbody>

<tr th:each="a : ${list}">

<td th:text="${a.id}"></td>

<td th:text="${a.patientName}"></td>

<td th:text="${a.doctorName}"></td>

<td th:text="${a.date}"></td>

<td th:text="${a.time}"></td>

<td th:text="${a.problem}"></td>


<!-- STATUS -->

<td>

<span class="badge bg-warning"
th:if="${a.status=='PENDING'}">

Pending

</span>

<span class="badge bg-success"
th:if="${a.status=='APPROVED'}">

Approved

</span>

<span class="badge bg-danger"
th:if="${a.status=='CANCELLED'}">

Cancelled

</span>

</td>


<!-- ACTION -->

<td>

<a th:href="@{'/appointment/approve/' + ${a.id}}"
class="btn btn-sm btn-success">

<i class="fa fa-check"></i>

</a>

<a th:href="@{'/appointment/cancel/' + ${a.id}}"
class="btn btn-sm btn-danger">

<i class="fa fa-times"></i>

</a>

</td>


<!-- CREATE REPORT -->

<td>

<a th:href="@{/doctor/create-report/{id}(id=${a.id})}"
class="btn btn-sm btn-primary">

<i class="fa fa-file-medical"></i>
Create

</a>

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

</body>
</html>
