<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<meta charset="UTF-8">
<title>Book Appointment</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<!-- ✅ Bootstrap -->
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

   <!-- ✅ Font Awesome -->
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

   
<style>
.form{
    background:white;
    min-height:100vh;
	
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Poppins', sans-serif;
	
}


/* Navbar */

.navbar{
padding:12px 0;
}

.form-card{
    background:white;
    padding:30px;
    border-radius:20px;
    width:100%;
    max-width:450px;
    box-shadow:0 20px 40px rgba(0,0,0,0.5);
}

.form-title{
    text-align:center;
    margin-bottom:20px;
    font-weight:600;
}

.form-control{
    border-radius:10px;
    padding:10px;
}

.btn-custom{
    background:linear-gradient(45deg,#4facfe,#00f2fe);
    border:none;
    border-radius:25px;
    padding:10px;
    width:100%;
    color:white;
    font-weight:500;
}

.btn-custom:hover{
    opacity:0.9;
}

</style>

</head>

<body>
	
	
	
	<!-- NAVBAR -->

		<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">

		<div class="container">

		<a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="/">

		<img src="https://cdn-icons-png.flaticon.com/512/2966/2966327.png"
		width="36">

		MedixO

		</a>

		<div class="d-flex gap-3">

			<a href="/" class="btn btn-outline-light btn-sm">
			<i class="fa fa-home"></i> Home
			</a>

		<button onclick="history.back()" 
		        class="btn btn-outline-light btn-sm">
		        <i class="fa fa-arrow-left"></i> Back
		</button>



		</div>

		</div>

		</nav>

	
<div class="form">
<div class="form-card">

    <h4 class="form-title">
        <i class="fa fa-calendar-plus"></i> Book Appointment
    </h4>

    <!--<form action="/saveAppointment" method="post">-->
		<form th:action="@{/payment-page}" method="post">

        <!-- Doctor -->
        <div class="mb-3">
            <label>Select Doctor</label>
            <select name="doctorId" class="form-control" required>
                <option value="">-- Choose Doctor --</option>
                <option th:each="doc : ${doctors}"
                        th:value="${doc.id}"
                        th:text="${doc.name}">
                </option>
            </select>
        </div>

        <!-- Date -->
        <div class="mb-3">
            <label>Date</label>
            <input type="date" name="date" class="form-control" required>
        </div>

        <!-- Time -->
        <div class="mb-3">
            <label>Time</label>
            <input type="time" name="time" class="form-control" required>
        </div>

        <!-- Problem -->
        <div class="mb-3">
            <label>Problem</label>
            <input type="text" name="problem" class="form-control" placeholder="Describe your issue" required>
        </div>

        <button type="submit" class="btn-custom">
            <i class="fa fa-check"></i> Confirm Booking
        </button>

    </form>

</div>
</div>

</body>
</html>
