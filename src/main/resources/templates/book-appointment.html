<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Book Appointment</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2 class="text-center mb-4">Online Appointment Booking</h2>

<form th:action="@{/saveAppointment}" th:object="${appointment}" method="post">

<div class="mb-3">
<label>Patient Name</label>
<input type="text" th:field="*{patientName}" class="form-control">
</div>

<div class="mb-3">
<label>Doctor Name</label>
<input type="text" th:field="*{doctorName}" class="form-control">
</div>

<div class="mb-3">
<label>Date</label>
<input type="date" th:field="*{date}" class="form-control">
</div>

<div class="mb-3">
<label>Time</label>
<input type="time" th:field="*{time}" class="form-control">
</div>

<div class="mb-3">
<label>Problem</label>
<textarea th:field="*{problem}" class="form-control"></textarea>
</div>

<button class="btn btn-primary">Book Appointment</button>

</form>

</div>

</body>
</html>
