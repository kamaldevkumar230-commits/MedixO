<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<title>Doctor Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
}

.profile-card{
background:white;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
padding:30px;
}

.doctor-img{
width:200px;
height:200px;
object-fit:cover;
border-radius:50%;
}

.video-box{
background:black;
height:400px;
border-radius:12px;
}

</style>

</head>

<body>
	
	

	<!-- NAVBAR -->

	<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">

	<div class="container">

	<a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="#">

	<img src="https://cdn-icons-png.flaticon.com/512/2966/2966327.png"
	width="36">

	MedixO

	</a>

	<div class="d-flex gap-2">

	<a href="/" class="btn btn-outline-light btn-sm">
	<i class="fa fa-home"></i> Home
	</a>


	<button onclick="history.back()" class="btn btn-outline-light btn-sm">
	<i class="fa fa-arrow-left"></i> Back
	</button>

	</div>

	</div>

	</nav>

	
	

<div class="container mt-5">

<div class="row">

<div class="col-md-4 text-center">

<img th:src="@{${doctor.image}}" class="doctor-img">

<h4 class="mt-3"
th:text="${doctor.firstName + ' ' + doctor.lastName}">
</h4>

<p th:text="${doctor.specialization}"></p>

</div>

<div class="col-md-8">

<div class="profile-card">

<h5>Doctor Details</h5>

<hr>

<p><b>Email:</b> <span th:text="${doctor.email}"></span></p>

<p><b>Phone:</b> <span th:text="${doctor.phone}"></span></p>

<p><b>Experience:</b> <span th:text="${doctor.experienceYears}"></span> Years</p>

<p><b>Consultation Fee:</b> ₹<span th:text="${doctor.consultationFee}"></span></p>

<button class="btn btn-danger mt-3" onclick="startCall()">
🚑 Emergency Video Call
</button>

<!-- NEW BUTTON -->
<button class="btn btn-secondary mt-3 ms-2" onclick="endCall()">
❌ End Call
</button>

</div>

</div>

</div>

<!-- Video Call Area -->

<div class="row mt-5">

<div class="col-md-6">

<h5>Your Camera</h5>

<video id="localVideo" autoplay muted class="video-box w-100"></video>

</div>

<div class="col-md-6">

<h5>Doctor Camera</h5>

<video id="remoteVideo" autoplay class="video-box w-100"></video>

</div>

</div>

</div>
<script src="/JS/patient_video_call.js"></script>
</body>
</html>
