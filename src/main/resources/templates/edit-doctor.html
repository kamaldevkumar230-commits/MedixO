<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<title>Edit Doctor | Medixo HMS</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f7fb;
}

.card{
border-radius:12px;
}

.navbar-brand{
font-weight:bold;
}

</style>

</head>

<body>

<!-- Navbar -->


<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">

<div class="container">

<a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="#">

<img src="https://cdn-icons-png.flaticon.com/512/2966/2966327.png"
width="36">

MedixO

</a>

<div class="d-flex gap-2">

<a href="/" class="btn btn-outline-light btn-sm">
<i class="fa fa-home"></i> Home
</a>


<button onclick="history.back()" class="btn btn-outline-light btn-sm">
<i class="fa fa-arrow-left"></i> Back
</button>

</div>

</div>

</nav>



<!-- Page -->

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-8">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h4>Edit Doctor</h4>

</div>

<div class="card-body">

<form th:action="@{/doctors/update}" 
      th:object="${doctor}" 
      method="post">

<input type="hidden" th:field="*{id}">


<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">Doctor Code</label>

<input type="text"
       class="form-control"
       th:field="*{doctorCode}">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Specialization</label>

<input type="text"
       class="form-control"
       th:field="*{specialization}">

</div>

</div>


<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">First Name</label>

<input type="text"
       class="form-control"
       th:field="*{firstName}">

</div>

</div>


<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">Email</label>

<input type="email"
       class="form-control"
       th:field="*{email}">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Phone</label>

<input type="text"
       class="form-control"
       th:field="*{phone}">

</div>

</div>


<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">Experience (Years)</label>

<input type="number"
       class="form-control"
       th:field="*{experienceYears}">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Consultation Fee</label>

<input type="number"
       class="form-control"
       th:field="*{consultationFee}">

</div>

</div>


<div class="mb-3">

<label class="form-label">Status</label>

<select class="form-control" th:field="*{status}">

<option value="ACTIVE">ACTIVE</option>
<option value="PENDING">INACTIVE</option>

</select>

</div>


<div class="d-flex justify-content-between">

<a href="/doctors" class="btn btn-secondary">
Back
</a>

<button type="submit" class="btn btn-success">
Update Doctor
</button>

</div>

</form>

</div>

</div>

</div>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
