<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>UPI Payment</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-2xl shadow-xl w-96 text-center">

    <h2 class="text-2xl font-bold mb-4">Scan & Pay</h2>

    <!-- 💰 Amount -->
    <p class="text-gray-600 mb-2">Amount</p>
    <h1 class="text-3xl font-bold text-green-600 mb-4">₹500</h1>

    <!-- 📱 QR Code -->
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=yourupi@upi&pn=MedixO&am=500"
         class="mx-auto mb-4">

    <!-- 🆔 UPI ID -->
    <p class="text-sm text-gray-500 mb-4">UPI ID: yourupi@upi</p>

    <!-- Hidden booking data -->
    <form th:action="@{/confirm-booking}" method="post">

        <input type="hidden" name="doctorId" th:value="${doctorId}">
        <input type="hidden" name="date" th:value="${date}">
        <input type="hidden" name="time" th:value="${time}">
        <input type="hidden" name="problem" th:value="${problem}">
        <input type="hidden" name="paymentMode" value="UPI">

        <button class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700">
            Payment Done
        </button>

    </form>

</div>

</body>
</html>
