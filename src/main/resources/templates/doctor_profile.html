<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Doctor Profile</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

	

	<!-- ✅ Bootstrap -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

	<!-- ✅ Font Awesome -->
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
	
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #f5f7fb;
        }

		/* Navbar */

		.navbar{
		padding:12px 0;
		}

		
		
        .profile-container {
            max-width: 900px;
            margin: 40px auto;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* HEADER */
        .profile-header {
            background: linear-gradient(135deg, #4facfe, #00c6ff);
            padding: 30px;
            text-align: center;
            color: white;
        }

        .profile-header img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid white;
            object-fit: cover;
            margin-bottom: 10px;
        }

        .profile-header h2 {
            margin: 5px 0;
        }

        .profile-header p {
            font-size: 14px;
            opacity: 0.9;
        }

        /* BODY */
        .profile-body {
            padding: 25px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .info-box {
            background: #f9fbfd;
            padding: 15px;
            border-radius: 10px;
        }

        .info-box label {
            font-size: 13px;
            color: #888;
        }

        .info-box h4 {
            margin-top: 5px;
            color: #333;
        }

        /* STATUS BADGE */
        .status {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .approved {
            background: #e6ffed;
            color: #28a745;
        }

        .pending {
            background: #fff3cd;
            color: #856404;
        }

        /* BUTTON */
        .edit-btn {
            margin-top: 25px;
            text-align: center;
        }

        .edit-btn a {
            text-decoration: none;
            background: #4facfe;
            color: white;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: 500;
            transition: 0.3s;
        }

        .edit-btn a:hover {
            background: #007bff;
        }

        @media(max-width: 600px){
            .info-grid {
                grid-template-columns: 1fr;
            }
        }

    </style>
</head>

<body>
	

	<!-- NAVBAR -->

	<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">

	<div class="container">

	<a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="/">

	<img src="https://cdn-icons-png.flaticon.com/512/2966/2966327.png"
	width="36">

	MedixO

	</a>

	<div class="d-flex gap-3">

		<a href="/" class="btn btn-outline-light btn-sm">
		<i class="fa fa-home"></i> Home
		</a>

	<button onclick="history.back()" 
	        class="btn btn-outline-light btn-sm">
	        <i class="fa fa-arrow-left"></i> Back
	</button>


	<a href="/login" class="btn btn-outline-light btn-sm">
	<i class="fa fa-sign-in"></i> Login
	</a>

	</div>

	</div>

	</nav>

	
	

<div class="profile-container">

    <!-- HEADER -->
    <div class="profile-header">
       <img th:src="${doctor != null and doctor.image != null} ? ${doctor.image} : '/images/default.png'">

        <h2 th:text="${doctor.firstName}"></h2>
        <p th:text="${doctor.specialization}"></p>

        <!-- Status -->
        <span class="status"
              th:classappend="${doctor.status == 'APPROVED'} ? 'approved' : 'pending'"
              th:text="${doctor.status}">
        </span>
    </div>

    <!-- BODY -->
    <div class="profile-body">

        <div class="info-grid">

            <div class="info-box">
                <label>Email</label>
                <h4 th:text="${doctor.email}"></h4>
            </div>

            <div class="info-box">
                <label>Phone</label>
                <h4 th:text="${doctor.phone}"></h4>
            </div>

            <div class="info-box">
                <label>Experience</label>
                <h4 th:text="${doctor.experienceYears + ' Years'}"></h4>
            </div>

            <div class="info-box">
                <label>Consultation Fee</label>
                <h4 th:text="'₹ ' + doctor.consultationFee"></h4>
            </div>

            <div class="info-box">
                <label>Doctor Code</label>
                <h4 th:text="${doctor.doctorCode}"></h4>
            </div>

            <div class="info-box">
                <label>Joined On</label>
                <h4 th:text="${#temporals.format(doctor.createdAt, 'dd MMM yyyy')}"></h4>
            </div>

        </div>

        <!-- EDIT BUTTON -->
        <div class="edit-btn">
            <a th:href="@{/doctor_profile_form}">Edit Profile</a>
        </div>

    </div>

</div>

</body>
</html>
