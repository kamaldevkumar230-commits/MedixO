<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Doctors | MedixO</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background-color: #f4f6f9;
}

.card {
    border-radius: 15px;
}

.status-active {
    background-color: #d4edda;
    color: #155724;
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 12px;
}
</style>
</head>

<body>

<div class="container mt-5">

    <!-- Page Title -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">👨‍⚕️ Doctor Management</h2>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addDoctorModal">
            + Add Doctor
        </button>
    </div>

    <!-- Search -->
    <div class="mb-3">
        <input type="text" class="form-control" placeholder="Search by specialization...">
    </div>

    <!-- Doctor Table -->
    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Code</th>
                        <th>Name</th>
                        <th>Specialization</th>
                        <th>Email</th>
                        <th>Experience</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
				<tbody>
				    <tr th:each="d : ${doctors}">
				        <td th:text="${d.doctorCode}"></td>
				        <td th:text="${d.firstName + ' ' + d.lastName}"></td>
				        <td th:text="${d.specialization}"></td>
				        <td th:text="${d.email}"></td>
				        <td th:text="${d.experienceYears + ' Years'}"></td>
				        <td>
				            <span class="badge bg-success"
				                  th:text="${d.status}"></span>
				        </td>
						<td>
							<a th:href="@{/doctors/edit/{id}(id=${d.id})}" 
							class="btn btn-warning">Edit</a>


						    <a th:href="@{'/doctors/delete/' + ${d.id}}"
						       class="btn btn-sm btn-danger"
						       onclick="return confirm('Are you sure?')">Delete</a>
						</td>
				    </tr>
				</tbody>
            </table>
        </div>
    </div>

</div>


<!-- Add Doctor Modal -->
<div class="modal fade" id="addDoctorModal">
<div class="modal-dialog modal-lg">
<div class="modal-content">

<div class="modal-header bg-primary text-white">
<h5 class="modal-title">Add New Doctor</h5>
<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<form th:action="@{/doctors/save}" method="post"
      th:object="${doctor}"
      enctype="multipart/form-data">

<input type="hidden" th:field="*{id}">

<div class="row">

<div class="col-md-6 mb-3">
<label>First Name</label>
<input type="text" th:field="*{firstName}" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>Last Name</label>
<input type="text" th:field="*{lastName}" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Specialization</label>

<select th:field="*{specialization}" class="form-select" required>

<option value="">Select Specialization</option>
<option value="Cardiology">Cardiology</option>
<option value="Neurology">Neurology</option>
<option value="Orthopedic">Orthopedic</option>
<option value="Dermatology">Dermatology</option>
<option value="Pediatrics">Pediatrics</option>
<option value="General Physician">General Physician</option>

</select>

</div>

<div class="col-md-6 mb-3">
<label>Email</label>
<input type="email" th:field="*{email}" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Phone</label>
<input type="text" th:field="*{phone}" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Experience (Years)</label>
<input type="number" th:field="*{experienceYears}" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Consultation Fee</label>
<input type="number" step="0.01" th:field="*{consultationFee}" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Doctor Image</label>

<input type="file"
       name="imageFile"
       class="form-control"
       accept="image/*">

</div>

</div>

<button type="submit" class="btn btn-success w-100">
Save Doctor
</button>

</form>

</div>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
