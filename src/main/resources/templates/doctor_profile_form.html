<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Doctor Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<!-- ✅ Bootstrap -->
	   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

	   <!-- ✅ Font Awesome -->
	   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            background: #f4f6f9;
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>
	

	<!-- NAVBAR -->

	<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">

	<div class="container">

	<a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="/">

	<img src="https://cdn-icons-png.flaticon.com/512/2966/2966327.png"
	width="36">

	MedixO

	</a>

	<div class="d-flex gap-3">

		<a href="/" class="btn btn-outline-light btn-sm">
		<i class="fa fa-home"></i> Home
		</a>

	<button onclick="history.back()" 
	        class="btn btn-outline-light btn-sm">
	        <i class="fa fa-arrow-left"></i> Back
	</button>


	<a href="/login" class="btn btn-outline-light btn-sm">
	<i class="fa fa-sign-in"></i> Login
	</a>

	</div>

	</div>

	</nav>




	

<div class="container mt-5">
    <div class="card p-4">

        <h3 class="text-center mb-4">Complete Your Doctor Profile</h3>

        <form action="/doctor/update-profile" method="post" enctype="multipart/form-data">

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label>Specialization</label>
                    <select name="specialization" class="form-select" required>
                        <option value="">Select</option>
                        <option>Cardiology</option>
                        <option>Neurology</option>
                        <option>Orthopedic</option>
                        <option>Dermatology</option>
                        <option>Pediatrics</option>
                        <option>General Physician</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Experience (Years)</label>
                    <input type="number" name="experienceYears" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Consultation Fee</label>
                    <input type="number" name="consultationFee" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Phone</label>
                    <input type="text" name="phone" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Upload Image</label>
                    <input type="file" name="imageFile" class="form-control">
                </div>

            </div>

            <button class="btn btn-primary w-100">Save Profile</button>

        </form>

    </div>
</div>

</body>
</html>
