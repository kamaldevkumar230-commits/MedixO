<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Patients | MedixO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="mb-4">Patient Management</h2>

    <!-- Add Patient Form -->
    <form th:action="@{/patients/save}" method="post" th:object="${patient}">
        <div class="row">
            <div class="col-md-4 mb-3">
                <input type="text" th:field="*{firstName}" class="form-control" placeholder="First Name" required>
            </div>

            <div class="col-md-4 mb-3">
                <input type="text" th:field="*{lastName}" class="form-control" placeholder="Last Name">
            </div>

            <div class="col-md-4 mb-3">
                <input type="text" th:field="*{gender}" class="form-control" placeholder="Gender">
            </div>

            <div class="col-md-4 mb-3">
                <input type="date" th:field="*{dateOfBirth}" class="form-control">
            </div>

            <div class="col-md-4 mb-3">
                <input type="text" th:field="*{bloodGroup}" class="form-control" placeholder="Blood Group">
            </div>

            <div class="col-md-4 mb-3">
                <input type="text" th:field="*{phone}" class="form-control" placeholder="Phone">
            </div>

            <div class="col-md-6 mb-3">
                <input type="email" th:field="*{email}" class="form-control" placeholder="Email">
            </div>

            <div class="col-md-6 mb-3">
                <input type="text" th:field="*{address}" class="form-control" placeholder="Address">
            </div>
        </div>

        <button type="submit" class="btn btn-success">Save Patient</button>
    </form>

    <hr class="my-4">

    <!-- Patient List -->
    <table class="table table-bordered">
        <thead class="table-dark">
            <tr>
                <th>Code</th>
                <th>Name</th>
                <th>Gender</th>
                <th>Blood Group</th>
                <th>Phone</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${patients}">
                <td th:text="${p.patientCode}"></td>
                <td th:text="${p.firstName + ' ' + p.lastName}"></td>
                <td th:text="${p.gender}"></td>
                <td th:text="${p.bloodGroup}"></td>
                <td th:text="${p.phone}"></td>
            </tr>
        </tbody>
    </table>

</div>

</body>
</html>
