<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<meta charset="UTF-8">
<title>Medical Reports | Medixo</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<style>

body{
background:#f4f6fb;
font-family:Segoe UI;
}

.card{
border:none;
border-radius:10px;
box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

.table thead{
background:#0d6efd;
color:white;
}

.table tbody tr:hover{
background:#f1f5ff;
}

</style>

</head>

<body>
	
	

	<!-- NAVBAR -->

	<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">

	<div class="container">

	<a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="#">

	<img src="https://cdn-icons-png.flaticon.com/512/2966/2966327.png"
	width="36">

	MedixO

	</a>

	<div class="d-flex gap-3">

	<a href="/" class="text-white text-decoration-none">Home</a>

	<a href="doctors" class="text-white text-decoration-none">Doctors</a>

	<a href="register" class="text-white text-decoration-none">Register</a>

	</div>

	</div>

	</nav>


	

<div class="container mt-4">

<h3 class="mb-4">
<i class="fa fa-file-medical text-primary"></i>
Medical Reports
</h3>

<div class="card">

<div class="card-body">

<table class="table table-hover">

<thead>

<tr>


<th>Doctor</th>
<th>Date</th>
<th>Action</th>

</tr>

</thead>

<tbody>

<tr th:each="report : ${reports}">



<td th:text="${report.doctorName}"></td>

<td th:text="${report.date}"></td>

<td>

<a th:href="@{/report/download/{id}(id=${report.id})}"
class="btn btn-danger btn-sm">

<i class="fa fa-file-pdf"></i>
PDF

</a>

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

</body>
</html>
