<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<title>Add Medical Report</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
font-family:'Segoe UI', sans-serif;
}

.report-card{
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.form-control{
border-radius:8px;
}

.submit-btn{
border-radius:25px;
padding:10px;
font-weight:600;
}

</style>

</head>

<body>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-8">

<div class="card report-card">

<div class="card-header bg-primary text-white">

<h4 class="mb-0">
<i class="fa fa-file-medical"></i>
Add Medical Report
</h4>

</div>

<div class="card-body">

<form th:action="@{/saveReport}" th:object="${report}" method="post">

<!-- Patient Name -->

<div class="mb-3">

<label class="form-label">
Patient Name
</label>

<input type="text"
       th:field="*{patientName}"
       class="form-control"
       placeholder="Enter Patient Name">

</div>

<!-- Doctor Name -->

<div class="mb-3">

<label class="form-label">
Doctor Name
</label>

<input type="text"
       th:field="*{doctorName}"
       class="form-control"
       placeholder="Enter Doctor Name">

</div>

<!-- Diagnosis -->

<div class="mb-3">

<label class="form-label">
Diagnosis
</label>

<textarea
        th:field="*{diagnosis}"
        class="form-control"
        rows="3"
        placeholder="Patient diagnosis details">
</textarea>

</div>

<!-- Prescription -->

<div class="mb-3">

<label class="form-label">
Prescription
</label>

<textarea
        th:field="*{prescription}"
        class="form-control"
        rows="3"
        placeholder="Medicine and treatment details">
</textarea>

</div>

<!-- Date -->

<div class="mb-3">

<label class="form-label">
Date
</label>

<input type="date"
       th:field="*{date}"
       class="form-control">

</div>

<!-- Button -->

<button class="btn btn-primary w-100 submit-btn">

<i class="fa fa-save"></i>
Save Report

</button>

</form>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
